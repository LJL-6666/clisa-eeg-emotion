hydra:
  run:
    dir: runs/variants/clisa_00547_fold_default_mlp128/published/hydra_runs/pretrain_f9
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.job.chdir=False
    - hydra.run.dir=runs/variants/clisa_00547_fold_default_mlp128/published/hydra_runs/pretrain_f9
    - hydra.mode=RUN
    task:
    - data=FACED_def
    - model=cnn_clisa
    - data.data_dir=runs/variants/clisa_00547_fold_default_mlp128/published/data
    - +data.after_remarks_dir=runtime_inputs/after_remarks
    - log.cp_dir=runs/variants/clisa_00547_fold_default_mlp128/published/checkpoints
    - log.run=1
    - log.exp_name=local_faced_processed_005_47_full
    - log.proj_name=CLISA_CODE
    - train.valid_method=10
    - train.max_epochs=80
    - train.min_epochs=80
    - train.num_workers=0
    - train.iftest=False
    - +log.use_wandb=false
    - ext_fea.use_pretrain=True
    - ext_fea.normTrain=True
    - ext_fea.mode=de
    - ext_fea.batch_size=2048
    - ext_fea.use_lds=True
    - ext_fea.lds_given_all=0
    - ext_fea.pretrain_checkpoint=best
    - mlp.max_epochs=100
    - mlp.min_epochs=100
    - mlp.batch_size=512
    - mlp.num_workers=0
    - mlp.wd=0.0022
    - train.gpus=[0]
  job:
    name: train_ext
    chdir: false
    override_dirname: +data.after_remarks_dir=runtime_inputs/after_remarks,+log.use_wandb=false,data.data_dir=runs/variants/clisa_00547_fold_default_mlp128/published/data,data=FACED_def,ext_fea.batch_size=2048,ext_fea.lds_given_all=0,ext_fea.mode=de,ext_fea.normTrain=True,ext_fea.pretrain_checkpoint=best,ext_fea.use_lds=True,ext_fea.use_pretrain=True,log.cp_dir=runs/variants/clisa_00547_fold_default_mlp128/published/checkpoints,log.exp_name=local_faced_processed_005_47_full,log.proj_name=CLISA_CODE,log.run=1,mlp.batch_size=512,mlp.max_epochs=100,mlp.min_epochs=100,mlp.num_workers=0,mlp.wd=0.0022,model=cnn_clisa,train.gpus=[0],train.iftest=False,train.max_epochs=80,train.min_epochs=80,train.num_workers=0,train.valid_method=10
    id: ???
    num: ???
    config_name: config
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: .
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: cfgs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: runs/variants/clisa_00547_fold_default_mlp128/published/hydra_runs/pretrain_f9
    choices:
      model: cnn_clisa
      data: FACED_def
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
